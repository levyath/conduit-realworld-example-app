apiVersion: v1
kind: LimitRange
metadata:
  name: conduit-limit-range
  namespace: conduit
spec:
  limits:
  - max:
      cpu: "1"
      memory: 1Gi
    min:
      cpu: "50m"
      memory: 64Mi
    default:
      cpu: "200m"
      memory: 256Mi
    defaultRequest:
      cpu: "100m"
      memory: 128Mi
    type: Container
