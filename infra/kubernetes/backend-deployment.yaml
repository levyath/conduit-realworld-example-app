apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: conduit-prod
  labels:
    app: backend
    tier: application
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: application
    spec:
      containers:
      - name: backend
        image: levyath/conduit-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: PROD_DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: PROD_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: PROD_DB_NAME
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: db_name
        - name: PROD_DB_HOSTNAME
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: db_hostname
        - name: PROD_DB_DIALECT
          value: "postgres"
        - name: JWT_KEY
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: jwt_key
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
        livenessProbe:
          httpGet:
            path: /api/tags
            port: 3001
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/tags
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
