apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: conduit-frontend-hpa
  namespace: conduit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: conduit-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
