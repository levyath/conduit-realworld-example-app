# This file is a template. Secrets will be created via kubectl during deployment.
# DO NOT commit actual secrets to the repository!

# Create secrets with:
# kubectl create secret generic db-credentials \
#   --from-literal=username=conduit_user \
#   --from-literal=password='PostgreSQL@2026!Conduit' \
#   -n conduit-prod

# kubectl create secret generic jwt-secret \
#   --from-literal=jwt_key='your-jwt-secret-key' \
#   -n conduit-prod

---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: conduit-prod
type: Opaque
data:
  # Base64 encoded values will be created by kubectl
  username: ""
  password: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: conduit-prod
type: Opaque
data:
  # Base64 encoded values will be created by kubectl
  jwt_key: ""
