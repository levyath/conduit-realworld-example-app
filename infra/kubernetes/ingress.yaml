apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: conduit-ingress
  namespace: conduit-prod
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "conduit-ip"
    networking.gke.io/managed-certificates: "conduit-cert"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
