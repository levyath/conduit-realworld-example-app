apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: conduit-ingress
  namespace: conduit
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: conduit.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: conduit-frontend-service
            port:
              number: 80
